name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    defaults:
      run:
        working-directory: DeEsser
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate project
        run: xcodegen generate

      - name: Build app (Release, ad-hoc signed)
        run: |
          xcodebuild \
            -project DeEsser.xcodeproj \
            -scheme DeEsser \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath .build \
            build

      - name: Package DMG
        run: |
          APP_PATH=".build/Build/Products/Release/DeEsser.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH" >&2
            exit 1
          fi
          rm -rf dist
          mkdir -p dist
          cp -R "$APP_PATH" dist/DeEsser.app
          # Drag-to-install target inside the DMG window.
          ln -s /Applications dist/Applications
          hdiutil create \
            -volname "DeEsser" \
            -srcfolder dist \
            -ov \
            -format UDZO \
            DeEsser.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeEsser-macOS
          path: DeEsser/DeEsser.dmg

      - name: Publish release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DeEsser/DeEsser.dmg
