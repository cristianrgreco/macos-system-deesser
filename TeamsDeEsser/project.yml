name: TeamsDeEsser

options:
  bundleIdPrefix: local
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu17"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_WARN_ABOUT_RETURN_TYPE: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  TeamsDeEsser:
    type: application
    platform: macOS
    sources:
      - path: TeamsDeEsser
        excludes:
          - "Support/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.TeamsDeEsser
        PRODUCT_NAME: TeamsDeEsser
        INFOPLIST_FILE: TeamsDeEsser/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES
        SWIFT_OBJC_BRIDGING_HEADER: TeamsDeEsser/TeamsDeEsser-Bridging-Header.h
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES

  TeamsDeEsserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TeamsDeEsserTests
      - path: TeamsDeEsser/Realtime/DeEsserDSP.cpp
      - path: TeamsDeEsser/Realtime/DeEsserDSP.hpp
      - path: TeamsDeEsser/Realtime/Biquad.hpp
    dependencies:
      - target: TeamsDeEsser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.TeamsDeEsser.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TeamsDeEsser.app/Contents/MacOS/TeamsDeEsser"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/TeamsDeEsser/Realtime"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"

schemes:
  TeamsDeEsser:
    build:
      targets:
        TeamsDeEsser: all
        TeamsDeEsserTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TeamsDeEsserTests
